<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Exercice Souris - Profil B</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #F8F9FA; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #333; }
        .consigne { font-size: 20px; font-weight: bold; margin-bottom: 30px; color: #0056b3; }
        .zone-exercice { display: flex; justify-content: center; gap: 40px; margin-top: 50px; }
        .cible { width: 120px; height: 120px; background-color: #dc3545; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; cursor: pointer; user-select: none; transition: background-color 0.3s; }
        .valide { background-color: #28a745 !important; }
        #message-fin { display: none; font-size: 24px; color: #28a745; font-weight: bold; margin-top: 40px; }
    </style>
</head>
<body>

    <h1>Exercice : Précision du clic</h1>
    <p class="consigne">Consigne : Faites un SEUL clic gauche sur chaque carré rouge pour le faire passer au vert.</p>

    <div class="zone-exercice">
        <div class="cible" onclick="valider(this)">Carré 1</div>
        <div class="cible" onclick="valider(this)">Carré 2</div>
        <div class="cible" onclick="valider(this)">Carré 3</div>
        <div class="cible" onclick="valider(this)">Carré 4</div>
    </div>

    <div id="message-fin">Bravo ! Exercice réussi.</div>

    <script>
        function valider(element) {
            element.classList.add('valide');
            element.innerText = "✓ OK";
            verifierFin();
        }
        function verifierFin() {
            const cibles = document.querySelectorAll('.cible');
            const valides = document.querySelectorAll('.valide');
            if (cibles.length === valides.length) {
                document.getElementById('message-fin').style.display = 'block';
            }
        }
    </script>
</body>
</html>
